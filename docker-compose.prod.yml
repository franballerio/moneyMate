# Production overrides for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  postgres:
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}

  backend:
    restart: always
    environment:
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:?Secret key required}
    command: >
      bash -c "alembic upgrade head &&
               uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  frontend:
    restart: always
    environment:
      VITE_ENVIRONMENT: production
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?API URL required}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_data:
    driver: local
